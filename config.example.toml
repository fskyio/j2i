# j2i - XMPP-to-IRC bridge configuration

# ==============================================================================
# XMPP connections
# ==============================================================================
# Each [[xmpp]] entry defines an XMPP account or component the bridge uses.
# Give each a unique "name" to reference it in [[bridge]] entries.

[[xmpp]]
name = "myserver"
jid = "bridge@example.com"
password = "secret"

# Set to true to connect as an XEP-0114 component instead of a regular user.
# Requires server admin to configure the component subdomain.
# When false, the bridge connects as a regular XMPP user/bot.
component = false

# Only used when component = true.
# component_domain: the component's subdomain, configured on the XMPP server.
#   Puppet JIDs will be created under this domain (e.g. johndoe.libera@irc.example.org).
# component_host: host of the XMPP server's component listener (default: "localhost").
# component_port: port of the component listener (default: 5347).
# component_domain = "irc.example.org"
# component_host = "localhost"
# component_port = 5347

# Nick used by the bridge's master JID when joining MUCs.
nick = "IRC Bridge"

# --- Component-mode example ---
# [[xmpp]]
# name = "mycomponent"
# password = "shared-secret"    # shared secret configured in your XMPP server
# component = true
# component_domain = "irc.example.org"
# component_host = "localhost"
# component_port = 5347
# nick = "IRC Bridge"

# ==============================================================================
# IRC networks
# ==============================================================================
# Each [[irc]] entry defines a connection to an IRC network.
# Give each a unique "name" to reference it in [[bridge]] entries.

[[irc]]
name = "libera"
host = "irc.libera.chat"
port = 6697
tls = true
nick = "xmpp-bridge"

# Password for SASL authentication (optional).
# sasl_password = "secret"

# NickServ password (optional, used if SASL is not available).
# nickserv_password = "secret"

# Enable XMPP user puppeting on IRC via RELAYMSG.
# Requires the IRC network to support RELAYMSG and the bot to have +o in the channel.
# When false, falls back to "<nick> message" format.
relaymsg = true

# Suffix appended to spoofed nicks so they're distinguishable from real IRC
# users (e.g. alice/xmpp; the "/" separator is negotiated with the network).
# Optional per-network override; defaults to the global settings.relaymsg_suffix.
# relaymsg_suffix = "xmpp"

# Optional per-network override of the line-length ceiling (bytes) used to split
# long messages. Unset/0 auto-detects from the server's ISUPPORT LINELEN (512
# fallback). Overrides the global settings.max_line_bytes for this network.
# max_line_bytes = 900

# ==============================================================================
# Bridge mappings
# ==============================================================================
# Each [[bridge]] entry connects an XMPP MUC to an IRC channel.
# "xmpp" and "irc" reference the "name" fields from the sections above.

[[bridge]]
xmpp = "myserver"
xmpp_muc = "general@conference.example.com"
irc = "libera"
irc_channel = "#general"

[[bridge]]
xmpp = "myserver"
xmpp_muc = "offtopic@conference.example.com"
irc = "libera"
irc_channel = "#offtopic"

# Per-bridge overrides (optional). When set, these override the global [settings]
# for this specific bridge mapping only. Omit to use the global defaults.
# anti_ping = false
# max_lines = 10
# pastebin = "txt.t0.vc"
# pastebin_auth = "Bearer mytoken"
# pastebin_field = "txt"
# reply_style = "ping"

# ==============================================================================
# General settings
# ==============================================================================
[settings]

# Insert an anti-ping character (zero-width space) into nicks when relaying
# messages as text, to avoid accidentally pinging users on the other side.
anti_ping = true

# Maximum number of lines to relay individually from a multi-line XMPP message.
# Messages exceeding this will be uploaded to a pastebin instead (if configured).
# Set to 0 for unlimited (no pastebin, always split).
max_lines = 20

# Maximum IRC protocol line length in bytes, used to split over-long messages
# so the server does not silently truncate them. 0 (default) auto-detects the
# limit from the server's ISUPPORT LINELEN, falling back to the standard 512.
# Raise this on servers that advertise or allow longer lines. Can be overridden
# per-network in an [[irc]] block or per-bridge in a [[bridge]] block; the most
# specific set value wins (bridge > network > global > auto-detect).
# max_line_bytes = 0

# Pastebin service for long messages. When a multi-line XMPP message exceeds
# max_lines, it is uploaded here and the link is sent to IRC instead of flooding.
# Supported: "txt.t0.vc", "kmi.aeza.net", or a custom URL.
# Leave unset to truncate long messages instead of uploading.
# pastebin = "txt.t0.vc"

# Authorization header for the pastebin service (optional).
# Value is sent as-is in the Authorization header (e.g. "Bearer mytoken").
# pastebin_auth = "Bearer mytoken"

# Override the form field name for custom pastebin services (optional).
# Known services (txt.t0.vc, kmi.aeza.net) use their own field names automatically.
# pastebin_field = "txt"

# How XMPP replies are rendered on IRC when an XMPP user replies to a message.
#
# "quote" (default): include a truncated excerpt of the original message:
#   (re nick: "original message text") reply text
# "ping": mention the replied-to nick only, no excerpt:
#   nick: reply text
#
# The excerpt is sourced from an in-memory cache (up to 500 messages). Cache
# misses (e.g. after a restart) fall back to "ping" style automatically.
reply_style = "quote"

# Global default suffix appended to spoofed nicks in RELAYMSG (e.g. alice/xmpp).
# Individual networks can override this with relaymsg_suffix in their [[irc]] block.
relaymsg_suffix = "xmpp"
